services:
  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - minio
    environment:
      - MINIO_ENDPOINT=http://minio:9000

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"